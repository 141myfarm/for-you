<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Heart of Words</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            overflow: hidden;
            background: #03030c;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
    let scene, camera, renderer, composer;
    let particlesGroup;
    let startTime = Date.now();
    
    // НАСТРОЙКИ: 3500 слов достаточно, чтобы мобилки не лагали, но выглядело плотно
    const PARTICLE_COUNT = 3500; 
    const TEXT_STRING = "I love you";

    let state = {
        phase: 'vortex', // vortex -> assemble -> heartbeat
        timeInPhase: 0,
        beatFactor: 0
    };

    // Математическая формула 3D сердца (уменьшил коэффициенты, чтобы оно было компактным)
    function getHeartPoint(t, u, scale) {
        const x = 16 * Math.pow(Math.sin(t), 3) * Math.sin(u);
        const y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * Math.sin(u);
        const z = 10 * Math.cos(u); 
        return new THREE.Vector3(x * scale, y * scale, z * scale);
    }

    // Точки для красивого объемного вихря вокруг центра
    function getRandomVortexPoint(radius, height) {
        const r = Math.random() * radius + 40;
        const theta = Math.random() * Math.PI * 2;
        const x = r * Math.cos(theta);
        const z = r * Math.sin(theta);
        const y = (Math.random() - 0.5) * height;
        return new THREE.Vector3(x, y, z);
    }

    function createTextTexture(text) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 256;
        canvas.height = 64;
        
        ctx.fillStyle = 'rgba(0,0,0,0)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Делаем жирный красивый шрифт с неоновым свечением
        ctx.font = 'Bold 40px sans-serif';
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);
        
        const texture = new THREE.CanvasTexture(canvas);
        return texture;
    }

    function init() {
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x03030c, 0.002);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        // Отодвинул камеру чуть дальше (на 650 вместо 500), чтобы сердце гарантированно помещалось на экране
        camera.position.z = 650; 

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Настройка сочного Bloom-эффекта для сияния текста
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.0;
        bloomPass.strength = 1.6;
        bloomPass.radius = 0.6;

        composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        particlesGroup = new THREE.Group();
        scene.add(particlesGroup);

        const texture = createTextTexture(TEXT_STRING);
        
        // Авто-настройка размера сердца под экраны (для мобилок делаем компактнее)
        const isMobile = window.innerWidth < 768;
        const currentHeartScale = isMobile ? window.innerWidth * 0.015 : window.innerWidth * 0.010;

        // Создаем массив плоскостей (плашек) со словами "I love you"
        const planeGeometry = new THREE.PlaneGeometry(32, 8);

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const t = Math.random() * Math.PI * 2;
            const u = Math.random() * Math.PI;

            // Сердечные координаты
            const heartPos = getHeartPoint(t, u, currentHeartScale);
            heartPos.y += (isMobile ? 15 : 0); // Центровка по вертикали

            // Вихревые координаты
            const vortexPos = getRandomVortexPoint(280, 160);

            // Смесь цветов: от ярко-неонового розового до сочного красного
            const material = new THREE.MeshBasicMaterial({
                map: texture,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                side: THREE.DoubleSide
            });
            
            const colorBias = Math.random();
            material.color.lerpColors(new THREE.Color(0xff2266), new THREE.Color(0xff0033), colorBias);

            const mesh = new THREE.Mesh(planeGeometry, material);
            mesh.position.copy(vortexPos);

            // Сохраняем все данные в память меша
            mesh.userData = {
                heart: heartPos.clone(),
                vortex: vortexPos.clone(),
                current: vortexPos.clone(),
                speedShift: Math.random() * 0.5 + 0.5
            };

            particlesGroup.add(mesh);
        }

        window.addEventListener('resize', onWindowResize, false);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);

        const elapsed = (Date.now() - startTime) / 1000;
        const delta = 0.016;

        // Тайминги смены фаз
        if (state.phase === 'vortex' && elapsed > 6) {
            state.phase = 'assemble';
            state.timeInPhase = 0;
        } else if (state.phase === 'assemble' && state.timeInPhase > 5) {
            state.phase = 'heartbeat';
            state.timeInPhase = 0;
        }
        state.timeInPhase += delta;

        // Реалистичный двойной стук сердца
        if (state.phase === 'heartbeat') {
            const beatTime = elapsed * 1.4;
            state.beatFactor = Math.pow(Math.sin(beatTime * Math.PI), 14) * 0.10 + 
                               Math.pow(Math.sin(beatTime * Math.PI - Math.PI/4), 24) * 0.06;
        }

        particlesGroup.children.forEach((mesh) => {
            const data = mesh.userData;
            const p = mesh.position;

            if (state.phase === 'vortex') {
                // Фаза 1: Текст плавно вращается по кругу вокруг центра сцены
                const angle = 0.008 * data.speedShift;
                const oldX = p.x;
                p.x = p.x * Math.cos(angle) - p.z * Math.sin(angle);
                p.z = oldX * Math.sin(angle) + p.z * Math.cos(angle);
                p.y += Math.sin(elapsed * 2 + data.speedShift) * 0.15;
                
                // В вихре буквы слегка крутятся вокруг своей оси
                mesh.rotation.y = elapsed * data.speedShift;
            } 
            else if (state.phase === 'assemble') {
                // Фаза 2: Плавный сбор в сердце
                let speed = Math.min(state.timeInPhase / 3, 1) * 0.06;
                p.lerp(data.heart, speed);
                
                // Разворачиваем слова ровно к камере, чтобы их было легко читать
                mesh.rotation.set(0, 0, 0);
                mesh.lookAt(camera.position);
            }
            else if (state.phase === 'heartbeat') {
                // Фаза 3: Пульсация
                const pulseScale = 1 + state.beatFactor;
                const target = data.heart.clone().multiplyScalar(pulseScale);
                p.copy(target);
                
                mesh.rotation.set(0, 0, 0);
                mesh.lookAt(camera.position);
            }
        });

        // Плавный поворот всей сцены для 3D глубины
        if (state.phase !== 'vortex') {
            particlesGroup.rotation.y = Math.sin(elapsed * 0.2) * 0.15;
        } else {
            particlesGroup.rotation.y = elapsed * 0.03;
        }

        composer.render();
    }

    window.onload = () => {
        init();
        animate();
    };
</script>

</body>
</html>
