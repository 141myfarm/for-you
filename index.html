    // Математическая формула 3D сердца (уменьшил коэффициенты, чтобы оно было компактным)
    function getHeartPoint(t, u, scale) {
        const x = 16 * Math.pow(Math.sin(t), 3) * Math.sin(u);
        const y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * Math.sin(u);
        const z = 10 * Math.cos(u); 
        return new THREE.Vector3(x * scale, y * scale, z * scale);
    }

    // Точки для красивого объемного вихря вокруг центра
    function getRandomVortexPoint(radius, height) {
        const r = Math.random() * radius + 40;
        const theta = Math.random() * Math.PI * 2;
        const x = r * Math.cos(theta);
        const z = r * Math.sin(theta);
        const y = (Math.random() - 0.5) * height;
        return new THREE.Vector3(x, y, z);
    }

    function createTextTexture(text) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 256;
        canvas.height = 64;
        
        ctx.fillStyle = 'rgba(0,0,0,0)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Делаем жирный красивый шрифт с неоновым свечением
        ctx.font = 'Bold 40px sans-serif';
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);
        
        const texture = new THREE.CanvasTexture(canvas);
        return texture;
    }

        scene.fog = new THREE.FogExp2(0x03030c, 0.002);

        // Отодвинул камеру чуть дальше (на 650 вместо 500), чтобы сердце гарантированно помещалось на экране
        camera.position.z = 650; 

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.0;
        bloomPass.strength = 1.6;
        bloomPass.radius = 0.6;

        composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        scene.add(particlesGroup);
