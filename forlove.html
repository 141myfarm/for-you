<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Космическая Галактика 🌌</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            overflow: hidden;
            background: #020205;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
    let scene, camera, renderer, composer, particleSystem;
    let startTime = Date.now();
    const PARTICLE_COUNT = 15000; 

    let state = {
        phase: 'galaxy', // 'galaxy' -> 'morph' -> 'heart'
        timeInPhase: 0
    };

    // Математическая формула сердца
    function getHeartPoint(t, scale) {
        t = t * Math.PI * 2;
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
        return new THREE.Vector3(x * scale, y * scale, (Math.random() - 0.5) * 10 * scale);
    }

    // Логарифмическая спираль галактики вокруг черной дыры
    function getGalaxyPoint(index, scale) {
        const branches = 3; 
        const branch = index % branches;
        const radius = Math.pow(Math.random(), 2) * 220 + 15; 
        const angle = radius * 0.04 + (branch * (Math.PI * 2 / branches)) + (Math.random() - 0.5) * 0.2;

        const x = Math.cos(angle) * radius * scale;
        const z = Math.sin(angle) * radius * scale;
        const y = (Math.random() - 0.5) * 8 * scale * (1.0 - radius / 220); 

        return new THREE.Vector3(x, y, z);
    }

    function createParticleTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 32; canvas.height = 32;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
        grad.addColorStop(0, 'rgba(255,255,255,1)');
        grad.addColorStop(0.3, 'rgba(255,255,255,0.8)');
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 32, 32);
        return new THREE.CanvasTexture(canvas);
    }

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 180, 450);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.5, 0.4, 0.85);
        bloomPass.threshold = 0.0;
        bloomPass.strength = 2.8; 
        bloomPass.radius = 0.5;

        composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);

        const isMobile = window.innerWidth < 768;
        const scale = isMobile ? 7.0 : 11.0;
        const galaxyScale = isMobile ? 1.1 : 1.6;

        const pData = [];
        const colorGalaxyCenter = new THREE.Color(0x00ffff);
        const colorGalaxyEdge = new THREE.Color(0x3300aa);
        const colorHeart = new THREE.Color(0xff0055);

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const galPos = getGalaxyPoint(i, galaxyScale);
            const rDist = galPos.length() / (220 * galaxyScale);
            const galColor = colorGalaxyCenter.clone().lerp(colorGalaxyEdge, rDist * 0.9);

            let heartTarget;
            if (i < PARTICLE_COUNT * 0.85) {
                heartTarget = getHeartPoint(Math.random(), scale);
            } else {
                const angle = Math.random() * Math.PI * 2;
                const r = (20 + Math.random() * 120) * scale * 0.15;
                heartTarget = new THREE.Vector3(Math.cos(angle) * r, Math.sin(angle) * r, (Math.random() - 0.5) * 80);
            }

            positions[i*3] = galPos.x;
            positions[i*3+1] = galPos.y;
            positions[i*3+2] = galPos.z;

            colors[i*3] = galColor.r;
            colors[i*3+1] = galColor.g;
            colors[i*3+2] = galColor.b;

            pData.push({
                galPos: galPos,
                heartPos: heartTarget,
                curPos: galPos.clone(),
                galColor: galColor,
                heartColor: colorHeart.clone().multiplyScalar(0.7 + Math.random() * 0.3),
                speedShift: Math.random() * 0.5 + 0.5
            });
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: isMobile ? 4.5 : 6.0,
            map: createParticleTexture(),
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            vertexColors: true
        });

        particleSystem = new THREE.Points(geometry, material);
        particleSystem.userData = { pData: pData };
        scene.add(particleSystem);

        window.addEventListener('resize', onWindowResize);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);

        const elapsed = (Date.now() - startTime) / 1000;
        const delta = 0.016;

        if (state.phase === 'galaxy' && elapsed > 6.0) {
            state.phase = 'morph';
            state.timeInPhase = 0;
        } else if (state.phase === 'morph' && state.timeInPhase > 4.0) {
            state.phase = 'heart';
            state.timeInPhase = 0;
        }
        state.timeInPhase += delta;

        const positions = particleSystem.geometry.attributes.position.array;
        const colors = particleSystem.geometry.attributes.color.array;
        const pData = particleSystem.userData.pData;

        pData.forEach((p, i) => {
            if (state.phase === 'galaxy') {
                const rDist = p.galPos.length();
                const rotSpeed = (50 / (rDist + 20)) * 0.4;
                const angle = elapsed * rotSpeed * p.speedShift;
                
                const origAngle = Math.atan2(p.galPos.z, p.galPos.x);
                const newAngle = origAngle + angle;
                
                p.curPos.x = Math.cos(newAngle) * rDist;
                p.curPos.z = Math.sin(newAngle) * rDist;
            } 
            else if (state.phase === 'morph') {
                const t = Math.min(state.timeInPhase / 4.0, 1.0);
                const ease = t * t * (3.0 - 2.0 * t); 

                const rDist = p.galPos.length();
                const rotSpeed = (50 / (rDist + 20)) * 0.4;
                const angle = (6.0 + state.timeInPhase) * rotSpeed * p.speedShift;
                const origAngle = Math.atan2(p.galPos.z, p.galPos.x);
                const newAngle = origAngle + angle;

                const spiralX = Math.cos(newAngle) * rDist;
                const spiralZ = Math.sin(newAngle) * rDist;
                const spiralY = p.galPos.y + ease * 80;

                const tempGalaxyPos = new THREE.Vector3(spiralX, spiralY, spiralZ);
                p.curPos.lerpVectors(tempGalaxyPos, p.heartPos, ease);

                colors[i*3] = THREE.MathUtils.lerp(p.galColor.r, p.heartColor.r, ease);
                colors[i*3+1] = THREE.MathUtils.lerp(p.galColor.g, p.heartColor.g, ease);
                colors[i*3+2] = THREE.MathUtils.lerp(p.galColor.b, p.heartColor.b, ease);
            } 
            else if (state.phase === 'heart') {
                const pulse = Math.sin(state.timeInPhase * 3.5) * 0.04;
                const wave = Math.sin(state.timeInPhase * 2.0 + p.speedShift * 5.0) * 1.5;
                
                p.curPos.copy(p.heartPos).multiplyScalar(1.0 + pulse);
                p.curPos.z += wave;

                colors[i*3] = p.heartColor.r;
                colors[i*3+1] = p.heartColor.g;
                colors[i*3+2] = p.heartColor.b;
            }

            positions[i*3] = p.curPos.x;
            positions[i*3+1] = p.curPos.y;
            positions[i*3+2] = p.curPos.z;
        });

        particleSystem.geometry.attributes.position.needsUpdate = true;
        particleSystem.geometry.attributes.color.needsUpdate = true;

        if (state.phase === 'galaxy') {
            camera.position.x = Math.sin(elapsed * 0.08) * 50;
            camera.position.z = Math.cos(elapsed * 0.08) * 450 + 50;
            camera.position.y = THREE.MathUtils.lerp(camera.position.y, 140, 0.02);
            camera.lookAt(0, 0, 0);
        } else if (state.phase === 'morph') {
            const t = state.timeInPhase / 4.0;
            camera.position.y = THREE.MathUtils.lerp(140, 0, t);
            camera.position.z = THREE.MathUtils.lerp(450, 380, t);
            camera.lookAt(0, 20, 0);
        } else if (state.phase === 'heart') {
            particleSystem.rotation.y = Math.sin(state.timeInPhase * 0.6) * 0.25;
        }

        composer.render();
    }

    window.onload = () => {
        init();
        animate();
    };
</script>

</body>
</html>
