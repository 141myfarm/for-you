<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cosmic Singularity & Heart Engine</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020204;
            font-family: sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            display: block;
            z-index: 1;
        }
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 2;
            transition: opacity 1s ease;
        }
    </style>
</head>
<body>

<div id="loader">Initializing Cosmos...</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
    // --- ENGINE CONFIGURATION ---
    const CONFIG = {
        particleCount: 45000,
        galaxyBranches: 3,
        galaxyRadius: 260.0,
        galaxySpin: 0.8,
        heartScale: 12.0,
        timeline: {
            galaxyDuration: 7.0,
            morphDuration: 5.0,
            heartDuration: 10.0
        }
    };

    // --- GLOBAL ENGINE STATE ---
    let scene, camera, renderer, composer;
    let particleSystem;
    let clock, startTime;
    let currentPhase = 0; // 0: Galaxy, 1: Morphing, 2: Heart Active
    let phaseTimer = 0.0;

    // --- MATHEMATICAL FORMULAS & GENERATORS ---
    function computeHeartGeometry(t) {
        t = t * Math.PI * 2.0;
        // Classical 3D parametric heart formulation
        const x = 16.0 * Math.pow(Math.sin(t), 3.0);
        const y = 13.0 * Math.cos(t) - 5.0 * Math.cos(2.0 * t) - 2.0 * Math.cos(3.0 * t) - Math.cos(4.0 * t);
        
        // Distribute thickness using a gaussian-inspired random Z displacement
        const u = Math.random();
        const v = Math.random();
        const zDistribution = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(Math.PI * 2.0 * v);
        const z = zDistribution * 3.5;

        return new THREE.Vector3(x, y, z);
    }

    function computeGalaxyGeometry(index, totalCount) {
        const branchIndex = index % CONFIG.galaxyBranches;
        
        // Exponential distribution for deep core concentration (Black Hole effect)
        const coreRatio = 0.25;
        let radius;
        if (Math.random() < coreRatio) {
            radius = Math.pow(Math.random(), 2.0) * (CONFIG.galaxyRadius * 0.15);
        } else {
            radius = Math.pow(Math.random(), 2.5) * CONFIG.galaxyRadius;
        }
        
        // Angular offset calculation mimicking spiral nebula density waves
        const spinAngle = radius * (CONFIG.galaxySpin / CONFIG.galaxyRadius) * Math.PI * 2.0;
        const branchAngle = (branchIndex / CONFIG.galaxyBranches) * Math.PI * 2.0;
        
        // Gas cloud dispersion calculations
        const dispersionFactor = (1.0 - (radius / CONFIG.galaxyRadius)) * 0.45 + 0.02;
        const radialSpread = (Math.random() - 0.5) * dispersionFactor;
        const theta = spinAngle + branchAngle + radialSpread;

        const x = Math.cos(theta) * radius;
        const z = Math.sin(theta) * radius;
        
        // Flattening ratio based on structural distance from galactic bulge
        const verticalFlattening = 40.0 * Math.exp(-radius / (CONFIG.galaxyRadius * 0.3));
        const y = (Math.random() - 0.5) * (verticalFlattening + 4.0);

        return new THREE.Vector3(x, y, z);
    }

    function generateParticleData() {
        const geometry = new THREE.BufferGeometry();
        
        const sourcePositions = new Float32Array(CONFIG.particleCount * 3);
        const targetPositions = new Float32Array(CONFIG.particleCount * 3);
        const initialColors = new Float32Array(CONFIG.particleCount * 3);
        const targetColors = new Float32Array(CONFIG.particleCount * 3);
