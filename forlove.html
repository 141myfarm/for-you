<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cosmic Singularity & Heart Engine v2.0</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010103;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            display: block;
            z-index: 1;
        }
        #canvas-overlay-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            box-sizing: border-box;
        }
        .ui-element {
            color: rgba(255, 255, 255, 0.25);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: color 0.5s ease;
        }
        #engine-status {
            align-self: flex-start;
        }
        #engine-telemetry {
            align-self: flex-end;
            text-align: right;
            font-family: monospace;
        }
        #loader-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #010103;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-top-color: rgba(0, 255, 240, 0.6);
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
            margin-bottom: 20px;
        }
        .loading-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="loader-screen">
    <div class="spinner"></div>
    <div class="loading-text">Loading Cosmic Engine</div>
</div>

<div id="canvas-overlay-ui">
    <div class="ui-element" id="engine-status">System: Initializing</div>
    <div class="ui-element" id="engine-telemetry">FPS: -- | P: 45000</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
    const ENGINE_GLOBAL_PROPERTIES = {
        technical: {
            totalParticles: 45000,
            simSpeed: 1.0,
            devicePixelRatioLimit: 2
        },
        galaxyMesh: {
            armsCount: 3,
            maxRadius: 270.0,
            coreDensityExponent: 2.8,
            twistFactor: 0.85,
            verticalSpreadFactor: 35.0,
            nebulaGlowBias: 0.18
        },
        heartMesh: {
            scaleMultiplier: 12.5,
            thicknessGaussianBias: 4.0,
            shellRetentionRatio: 0.86
        },
        chronology: {
            galaxyPhaseDuration: 6.0,
            morphPhaseDuration: 5.0,
            stabilizationHold: 4.0
        },
        vfx: {
            bloomStrength: 2.5,
            bloomRadius: 0.7,
            bloomThreshold: 0.08
        }
    };

    let appRuntimeContext = {
        sceneInstance: null,
        cameraInstance: null,
        webglRenderer: null,
        effectComposer: null,
        particleCoreSystem: null,
        clockReference: null,
        epochStartTime: 0,
        currentPhaseIndex: 0, 
        internalPhaseTimer: 0.0,
        ui: { status: null, telemetry: null, loader: null },
        interaction: {
            mouseX: 0, mouseY: 0, targetMouseX: 0, targetMouseY: 0, isDragging: false,
            previousTouchX: 0, previousTouchY: 0, cameraOrbitRadius: 550.0,
            phiAngle: 1.35, thetaAngle: 0.0, targetPhi: 1.35, targetTheta: 0.0
        },
        performanceMetrics: { frameCount: 0, lastFpsUpdate: 0, currentFps: 60 }
    };

    class CosmicMathematicsController {
        static computeParametricHeartVector(evaluationStep) {
            const angleRadian = evaluationStep * Math.PI * 2.0;
            const componentX = 16.0 * Math.pow(Math.sin(angleRadian), 3.0);
            const componentY = 13.0 * Math.cos(angleRadian) - 5.0 * Math.cos(2.0 * angleRadian) - 2.0 * Math.cos(3.0 * angleRadian) - Math.cos(4.0 * angleRadian);
            const uniformDistributionA = Math.random();
            const uniformDistributionB = Math.random();
            const coordinateZVariance = Math.sqrt(-2.0 * Math.log(uniformDistributionA)) * Math.cos(Math.PI * 2.0 * uniformDistributionB);
            const componentZ = coordinateZVariance * ENGINE_GLOBAL_PROPERTIES.heartMesh.thicknessGaussianBias;
            return new THREE.Vector3(componentX, componentY, componentZ);
        }

        static computeProceduralGalaxyVector(particleIndex) {
            const internalConfig = ENGINE_GLOBAL_PROPERTIES.galaxyMesh;
            const targetArmAssignment = particleIndex % internalConfig.armsCount;
            const allocationSplitThreshold = 0.22;
            let targetedRadius;
            if (Math.random() < allocationSplitThreshold) {
                targetedRadius = Math.pow(Math.random(), 2.0) * (internalConfig.maxRadius * 0.12);
            } else {
                targetedRadius = Math.pow(Math.random(), internalConfig.coreDensityExponent) * internalConfig.maxRadius;
            }
            const twistingAngleCalculation = targetedRadius * (internalConfig.twistFactor / internalConfig.maxRadius) * Math.PI * 2.0;
            const absoluteArmAngleOffset = (targetArmAssignment / internalConfig.armsCount) * Math.PI * 2.0;
            const cloudSpreadFactor = (1.0 - (targetedRadius / internalConfig.maxRadius)) * 0.42 + 0.03;
            const gasCloudDeviation = (Math.random() - 0.5) * cloudSpreadFactor;
            const combinedThetaAngle = twistingAngleCalculation + absoluteArmAngleOffset + gasCloudDeviation;
            const positionX = Math.cos(combinedThetaAngle) * targetedRadius;
            const positionZ = Math.sin(combinedThetaAngle) * targetedRadius;
            const structuralBulgeVerticalSpread = internalConfig.verticalSpreadFactor * Math.exp(-targetedRadius / (internalConfig.maxRadius * 0.28));
            const positionY = (Math.random() - 0.5) * (structuralBulgeVerticalSpread + 3.5);
            return new THREE.Vector3(positionX, positionY, positionZ);
        }
    }

    const HighEndVignetteGrainShader = {
        uniforms: {
            "tDiffuse": { value: null },
            "uVignetteDarkness": { value: 1.2 },
            "uVignetteOffset": { value: 0.95 },
            "uGrainAmount": { value: 0.045 },
            "uTime": { value: 0.0 }
        },
        vertexShader: `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
        fragmentShader: `
            uniform sampler2D tDiffuse;
            uniform float uVignetteDarkness;
            uniform float uVignetteOffset;
            uniform float uGrainAmount;
            uniform float uTime;
            varying vec2 vUv;
            float pseudoRandom(vec2 co) {
                return fract(sin(dot(co.xy, vec2(12.9898, 78.233))) * 43758.5453);
            }
            void main() {
                vec4 texelColor = texture2D(tDiffuse, vUv);
                vec2 uvDistortion = vUv - 0.5;
                float distanceToCenter = length(uvDistortion);
                float vignetteFactor = smoothstep(uVignetteOffset, uVignetteOffset - uVignetteDarkness, distanceToCenter);
                texelColor.rgb *= mix(1.0, vignetteFactor, 0.75);
                float noise = (pseudoRandom(vUv + sin(uTime)) - 0.5) * uGrainAmount;
                texelColor.rgb += vec3(noise);
                gl_FragColor = texelColor;
            }
        `
    };

    const ProgrammableGpuEngineShaders = {
        uniforms: {
            uTime: { value: 0.0 },
            uEnginePhase: { value: 0.0 },
            uPhaseProgress: { value: 0.0 },
            uTexture: { value: null }
        },
        vertexShader: `
            uniform float uTime;
            uniform float uPhaseProgress;
            uniform float uEnginePhase;
            attribute vec3 aTargetPosition;
            attribute vec3 aTargetColor;
            attribute vec4 aCustom;
            varying vec3 vColor;
            varying float vPhase;
            vec3 executeHardwareCubicBezierEase(vec3 start, vec3 end, float progression) {
                float squaredProgression = progression * progression;
                float optimizedEaseFactor = squaredProgression / (2.0 * (squaredProgression - progression) + 1.0);
                return mix(start, end, optimizedEaseFactor);
            }
            void main() {
                float scalarSpeedShift = aCustom.x;
                float basePhaseOffsetRadian = aCustom.y;
                float pointDimensionScale = aCustom.z;
                vec3 processingPositionVector = position;

                if (uEnginePhase == 0.0) {
                    float radialDistance2D = length(position.xz);
                    float trackingAngularVelocity = (80.0 / (radialDistance2D + 22.0)) * 0.52;
                    float cumulativeRotatedAngle = uTime * trackingAngularVelocity * scalarSpeedShift + basePhaseOffsetRadian;
                    float initialOrbitalAngle = atan(position.z, position.x);
                    float dynamicallyCalculatedAngle = initialOrbitalAngle + cumulativeRotatedAngle;
                    processingPositionVector.x = cos(dynamicallyCalculatedAngle) * radialDistance2D;
                    processingPositionVector.z = sin(dynamicallyCalculatedAngle) * radialDistance2D;
                    float galacticBulgeVibration = exp(-radialDistance2D * 0.04) * sin(uTime * 2.2 + basePhaseOffsetRadian);
                    processingPositionVector.y += galacticBulgeVibration * 5.0;
                    vColor = color;
                } 
                else if (uEnginePhase == 1.0) {
                    float radialDistance2D = length(position.xz);
                    float trackingAngularVelocity = (80.0 / (radialDistance2D + 22.0)) * 0.52;
                    float cumulativeRotatedAngle = (7.5 + uTime) * trackingAngularVelocity * scalarSpeedShift + basePhaseOffsetRadian;
                    float initialOrbitalAngle = atan(position.z, position.x);
                    float dynamicallyCalculatedAngle = initialOrbitalAngle + cumulativeRotatedAngle;
                    float localizedVerticalEjection = uPhaseProgress * 155.0 * sin(uPhaseProgress * 3.14159 + basePhaseOffsetRadian * 0.6);
                    vec3 transientGalacticStateVector = vec3(
                        cos(dynamicallyCalculatedAngle) * radialDistance2D,
                        position.y + localizedVerticalEjection,
                        sin(dynamicallyCalculatedAngle) * radialDistance2D
                    );
                    processingPositionVector = executeHardwareCubicBezierEase(transientGalacticStateVector, aTargetPosition, uPhaseProgress);
                    vColor = mix(color, aTargetColor, uPhaseProgress);
                } 
                else if (uEnginePhase == 2.0) {
                    float rhythmicPulseScalar = sin(uTime * 3.9) * 0.032;
                    processingPositionVector = aTargetPosition * (1.0 + rhythmicPulseScalar);
                    float complexInterlockingWaveform = sin(uTime * 2.4 + aTargetPosition.y * 0.075 + basePhaseOffsetRadian) * 2.4;
                    processingPositionVector.z += complexInterlockingWaveform;
                    processingPositionVector.x += sin(uTime * 1.15 + basePhaseOffsetRadian) * 0.85;
                    vColor = aTargetColor;
                }
                vPhase = uEnginePhase;
                vec4 intermediateModelViewProjection = modelViewMatrix * vec4(processingPositionVector, 1.0);
                gl_Position = projectionMatrix * intermediateModelViewProjection;
                gl_PointSize = (pointDimensionScale * 14.5) / (-intermediateModelViewProjection.z);
            }
        `,
        fragmentShader: `
            varying vec3 vColor;
            varying float vPhase;
            uniform sampler2D uTexture;
            void main() {
                vec4 activeTextureFragmentSample = texture2D(uTexture, gl_PointCoord);
                if (activeTextureFragmentSample.a < 0.04) { discard; }
                vec3 localizedCompositeColorMatrix = vColor * activeTextureFragmentSample.rgb;
                if (vPhase == 1.0) { localizedCompositeColorMatrix *= 1.35; }
                gl_FragColor = vec4(localizedCompositeColorMatrix, activeTextureFragmentSample.a);
            }
        `
    };

    class MemoryBufferAllocationFactory {
        static generateTextureMaskBuffer() {
            const drawingCanvas = document.createElement('canvas');
            drawingCanvas.width = 64; drawingCanvas.height = 64;
            const executionContext2D = drawingCanvas.getContext('2d');
            const radialGradiatingMatrix = executionContext2D.createRadialGradient(32, 32, 0, 32, 32, 32);
            radialGradiatingMatrix.addColorStop(0.0, 'rgba(255, 255, 255, 1.0)');
            radialGradiatingMatrix.addColorStop(0.18, 'rgba(240, 225, 255, 0.92)');
            radialGradiatingMatrix.addColorStop(0.45, 'rgba(120, 45, 255, 0.32)');
            radialGradiatingMatrix.addColorStop(1.0, 'rgba(0, 0, 0, 0.0)');
            executionContext2D.fillStyle = radialGradiatingMatrix;
            executionContext2D.fillRect(0, 0, 64, 64);
            const outputGlTexture = new THREE.CanvasTexture(drawingCanvas);
            outputGlTexture.minFilter = THREE.LinearFilter;
            return outputGlTexture;
        }

        static buildStructuralParticleGeometryMesh() {
            const customStructureGeometry = new THREE.BufferGeometry();
            const configTargetReference = ENGINE_GLOBAL_PROPERTIES;
            const allocationBufferSize = configTargetReference.technical.totalParticles;
            
            const arrayStreamSourcePositions = new Float32Array(allocationBufferSize * 3);
            const arrayStreamTargetPositions = new Float32Array(allocationBufferSize * 3);
            const arrayStreamInitialColors = new Float32Array(allocationBufferSize * 3);
            const arrayStreamTargetColors = new Float32Array(allocationBufferSize * 3);
            const arrayStreamCustomDynamics = new Float32Array(allocationBufferSize * 4);

            const paletteDefinitionGalaxyCore = new THREE.Color(0x00ffff);   
            const paletteDefinitionGalaxyNebula = new THREE.Color(0x6a00ff); 
            const paletteDefinitionGalaxyExtremity = new THREE.Color(0x050022);   
            const paletteDefinitionHeartPrimary = new THREE.Color(0xff0040);
            const paletteDefinitionHeartLuminescent = new THREE.Color(0xff55b5);

            for (let trackerId = 0; trackerId < allocationBufferSize; trackerId++) {
                const operationalGalaxyVector = CosmicMathematicsController.computeProceduralGalaxyVector(trackerId);
                arrayStreamSourcePositions[trackerId * 3] = operationalGalaxyVector.x;
                arrayStreamSourcePositions[trackerId * 3 + 1] = operationalGalaxyVector.y;
                arrayStreamSourcePositions[trackerId * 3 + 2] = operationalGalaxyVector.z;

                let operationalHeartVector;
                if (trackerId < allocationBufferSize * configTargetReference.heartMesh.shellRetentionRatio) {
                    operationalHeartVector = CosmicMathematicsController.computeParametricHeartVector(Math.random());
                    operationalHeartVector.multiplyScalar(configTargetReference.heartMesh.scaleMultiplier);
                } else {
                    const trackingRandomAngle = Math.random() * Math.PI * 2.0;
                    const trackingRandomScatterRadius = (25.0 + Math.random() * 155.0) * configTargetReference.heartMesh.scaleMultiplier * 0.15;
                    operationalHeartVector = new THREE.Vector3(
                        Math.cos(trackingRandomAngle) * trackingRandomScatterRadius,
                        Math.sin(trackingRandomScatterRadius) * trackingRandomScatterRadius,
                        (Math.random() - 0.5) * 110.0
                    );
                }
                arrayStreamTargetPositions[trackerId * 3] = operationalHeartVector.x;
                arrayStreamTargetPositions[trackerId * 3 + 1] = operationalHeartVector.y;
                arrayStreamTargetPositions[trackerId * 3 + 2] = operationalHeartVector.z;

                const individualDistanceMagnitudeRatio = operationalGalaxyVector.length() / configTargetReference.galaxyMesh.maxRadius;
                let transientColorContainer = new THREE.Color();
                if (individualDistanceMagnitudeRatio < 0.12) {
                    transientColorContainer.lerpColors(paletteDefinitionGalaxyCore, paletteDefinitionGalaxyNebula, individualDistanceMagnitudeRatio / 0.12);
                } else {
                    transientColorContainer.lerpColors(paletteDefinitionGalaxyNebula, paletteDefinitionGalaxyExtremity, (individualDistanceMagnitudeRatio - 0.12) / 0.88);
                }
                
                arrayStreamInitialColors[trackerId * 3] = transientColorContainer.r;
                arrayStreamInitialColors[trackerId * 3 + 1] = transientColorContainer.g;
                arrayStreamInitialColors[trackerId * 3 + 2] = transientColorContainer.b;

                const structuralColorSelectionBias = Math.random() > 0.45 ? paletteDefinitionHeartPrimary : paletteDefinitionHeartLuminescent;
                const systemicBrightnessVibrancyFactor = 0.82 + Math.random() * 0.18;
                arrayStreamTargetColors[trackerId * 3] = structuralColorSelectionBias.r * systemicBrightnessVibrancyFactor;
                arrayStreamTargetColors[trackerId * 3 + 1] = structuralColorSelectionBias.g * systemicBrightnessVibrancyFactor;
                arrayStreamTargetColors[trackerId * 3 + 2] = structuralColorSelectionBias.b * systemicBrightnessVibrancyFactor;

                arrayStreamCustomDynamics[trackerId * 4] = 0.45 + Math.random() * 1.45;        
                arrayStreamCustomDynamics[trackerId * 4 + 1] = Math.random() * Math.PI * 2.0; 
                arrayStreamCustomDynamics[trackerId * 4 + 2] = 1.1 + Math.random() * 3.8;        
                arrayStreamCustomDynamics[trackerId * 4 + 3] = trackerId;                             
            }

            customStructureGeometry.setAttribute('position', new THREE.BufferAttribute(arrayStreamSourcePositions, 3));
            customStructureGeometry.setAttribute('aTargetPosition', new THREE.BufferAttribute(arrayStreamTargetPositions, 3));
            customStructureGeometry.setAttribute('color', new THREE.BufferAttribute(arrayStreamInitialColors, 3));
            customStructureGeometry.setAttribute('aTargetColor', new THREE.BufferAttribute(arrayStreamTargetColors, 3));
            customStructureGeometry.setAttribute('aCustom', new THREE.BufferAttribute(arrayStreamCustomDynamics, 4));
            return customStructureGeometry;
        }
    }

    class InteractionInputRoutingSubsystem {
        static registerEventInterfaceListeners() {
            const context = appRuntimeContext.interaction;
            window.addEventListener('mousedown', (e) => {
                context.isDragging = true;
                context.previousTouchX = e.clientX; context.previousTouchY = e.clientY;
            }, { passive: true });

            window.addEventListener('mousemove', (e) => {
                if (!context.isDragging) {
                    context.targetMouseX = (e.clientX / window.innerWidth - 0.5) * 40.0;
                    context.targetMouseY = (e.clientY / window.innerHeight - 0.5) * 40.0;
                    return;
                }
                const frameDeltaX = e.clientX - context.previousTouchX;
                const frameDeltaY = e.clientY - context.previousTouchY;
                context.targetTheta -= frameDeltaX * 0.006;
